services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: ${CONNECTION_STRING:?Define CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER:-EduApoyos}
      Jwt__Audience: ${JWT_AUDIENCE:-EduApoyos}
      Jwt__Key: ${JWT_KEY:-clave-desarrollo-educapoyos-1234567890}
      Jwt__ExpireMinutes: ${JWT_EXPIRE_MINUTES:-120}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:8080}
    # Traefik enruta por la red compartida; no hace falta publicar al host.
    expose:
      - "8080"
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

  # Solo desarrollo local: docker compose --profile local up --build
  postgres:
    image: postgres:16-alpine
    profiles: ["local"]
    environment:
      POSTGRES_DB: educapoyos
      POSTGRES_USER: educapoyos
      POSTGRES_PASSWORD: educapoyos
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - educapoyos-postgres:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  educapoyos-postgres:
