services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: ${CONNECTION_STRING:?Define CONNECTION_STRING apuntando a tu PostgreSQL}
      Jwt__Issuer: ${JWT_ISSUER:-EduApoyos}
      Jwt__Audience: ${JWT_AUDIENCE:-EduApoyos}
      Jwt__Key: ${JWT_KEY:-clave-desarrollo-educapoyos-1234567890}
      Jwt__ExpireMinutes: ${JWT_EXPIRE_MINUTES:-120}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:8080}
    ports:
      - "${API_PORT:-5000}:8080"
    networks:
      - default
      - database
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - default
    restart: unless-stopped

  # Solo para desarrollo local: docker compose --profile local up --build
  postgres:
    image: postgres:16-alpine
    profiles: ["local"]
    environment:
      POSTGRES_DB: educapoyos
      POSTGRES_USER: educapoyos
      POSTGRES_PASSWORD: educapoyos
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - educapoyos-postgres:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped

networks:
  # Red de tu PostgreSQL externo (misma red donde corre el contenedor de la DB).
  # Sin esto, Isolated Deployment deja al API en una red propia y no resuelve el Host.
  database:
    external: true
    name: ${POSTGRES_NETWORK:?Define POSTGRES_NETWORK con el nombre de red del contenedor PostgreSQL}

volumes:
  educapoyos-postgres:
